services:
  nanobot-gateway:
    image: registry.gstephens.org/nanobot:latest
    container_name: nanobot-gateway
    command: ["gateway"]
    restart: unless-stopped
    volumes:
      - ./.nanobot:/root/.nanobot
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  nanobot-cli:
    image: registry.gstephens.org/nanobot:latest
    container_name: nanobot-cli
    profiles:
      - cli
    volumes:
      - ./.nanobot:/root/.nanobot
    stdin_open: true
    tty: true

networks:
  default:
    external: true
    name: app-network
